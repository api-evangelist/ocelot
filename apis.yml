aid: ocelot
name: Ocelot
description: >-
  Ocelot is an open-source API Gateway built with .NET for microservices
  architectures. It provides routing, authentication, rate limiting, load
  balancing, and service discovery features for managing and securing APIs
  in .NET ecosystems.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
