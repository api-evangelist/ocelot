apis:
  - aid: ocelot:ocelot-gateway
    name: Ocelot API Gateway
    description: >-
      Ocelot is an open-source .NET API Gateway that provides routing,
      authentication, authorization, rate limiting, load balancing, caching,
      and service discovery for microservices architectures. It is configured
      via JSON files and integrates with ASP.NET Core middleware pipelines.
    humanURL: https://ocelot.readthedocs.io/en/latest/
    baseURL: https://ocelot.readthedocs.io/
    tags:
      - .NET
      - API Gateway
      - Microservices
      - Routing
    properties:
      - type: Documentation
        url: https://ocelot.readthedocs.io/en/latest/
      - type: GettingStarted
        url: https://ocelot.readthedocs.io/en/latest/introduction/gettingstarted.html
      - type: Reference
        url: https://ocelot.readthedocs.io/en/latest/features/configuration.html
      - type: Authentication
        url: https://ocelot.readthedocs.io/en/latest/features/authentication.html
      - type: GitHubRepository
        url: https://github.com/ThreeMammals/Ocelot
  - aid: ocelot:ocelot-administration-api
    name: Ocelot Administration API
    description: >-
      The Ocelot Administration API allows runtime changes to gateway
      configuration via an authenticated HTTP API. It supports updating
      routes and clearing cache regions without restarting the gateway,
      and is authenticated using Bearer tokens issued by Ocelot's built-in
      IdentityServer or an external identity provider.
    humanURL: https://ocelot.readthedocs.io/en/latest/features/administration.html
    baseURL: https://ocelot.readthedocs.io/
    tags:
